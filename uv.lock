dependencies = [
    { name = "click" },
    { name = "fastapi" },
    { name = "google-api-python-client" },
    { name = "google-auth-httplib2" },
    { name = "google-auth-oauthlib" },
    { name = "imageio-ffmpeg" },
    { name = "jsonschema" },
    { name = "keyring" },
    { name = "keyrings-alt", marker = "sys_platform == 'linux'" },
    { name = "pillow" },
    { name = "platformdirs" },
    { name = "psutil" },
    { name = "pycairo", marker = "sys_platform == 'linux'" },
    { name = "pydantic" },
    { name = "pygobject", marker = "sys_platform == 'linux'" },
    { name = "pyrekordbox" },
    { name = "pystray" },
    { name = "pywebview" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.dev-dependencies]
dev = [
    { name = "pyinstaller" },
    { name = "pytest" },
]

[package.metadata]
requires-dist = [
    { name = "click", specifier = ">=8.1" },
    { name = "fastapi", specifier = ">=0.115" },
    { name = "google-api-python-client", specifier = ">=2.150" },
    { name = "google-auth-httplib2", specifier = ">=0.2" },
    { name = "google-auth-oauthlib", specifier = ">=1.2" },
    { name = "imageio-ffmpeg", specifier = ">=0.5" },
    { name = "jsonschema", specifier = ">=4.23" },
    { name = "keyring", specifier = ">=25.5" },
    { name = "keyrings-alt", marker = "sys_platform == 'linux'", specifier = ">=5.0.2" },
    { name = "pillow", specifier = ">=11.0" },
    { name = "platformdirs", specifier = ">=4.3" },
    { name = "psutil", specifier = ">=6.1" },
    { name = "pycairo", marker = "sys_platform == 'linux'", specifier = ">=1.29.0" },
    { name = "pydantic", specifier = ">=2.9" },
    { name = "pygobject", marker = "sys_platform == 'linux'", specifier = "<3.52" },
    { name = "pyrekordbox", specifier = ">=0.4.4" },
    { name = "pystray", specifier = ">=0.19" },
    { name = "pywebview", specifier = ">=5.3" },
    { name = "uvicorn", extras = ["standard"], specifier = ">=0.34" },
]

[package.metadata.requires-dev]
dev = [
    { name = "pyinstaller", specifier = ">=6.11" },
    { name = "pytest", specifier = ">=8.3" },
]
